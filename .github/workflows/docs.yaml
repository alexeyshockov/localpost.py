name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # required for `mkdocs gh-deploy` to push to gh-pages

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gh-deploy needs the full history of gh-pages

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync docs deps
        run: uv sync --group docs

      - name: Build & deploy to gh-pages
        run: uv run mkdocs gh-deploy --force --strict
