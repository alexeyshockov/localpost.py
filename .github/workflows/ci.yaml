name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version-file: ".python-version"
      - run: uv sync --all-groups --all-extras
      - name: ruff check
        run: uv run ruff check localpost
      - name: ruff format --check
        run: uv run ruff format --check localpost
      - name: ty
        run: uv run ty check localpost
      - name: type coverage (basedpyright --verifytypes)
        run: uv run basedpyright --pythonpath $(which python) --verifytypes localpost localpost/*

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Sonar needs full history
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --python ${{ matrix.python }} --all-groups --all-extras
      - name: pytest (unit only)
        timeout-minutes: 5
        run: >
          uv run --python ${{ matrix.python }}
          pytest -m "not integration" -v
          --cov-report=term --cov-report=xml --cov
      - name: Upload coverage (3.13)
        if: matrix.python == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 1

  sonarcloud:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  tests-free-threaded:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python 3.14t
        run: uv python install 3.14t
      - name: Install dependencies (FT-clean subset)
        # --no-default-groups + narrow opt-in: avoid C extensions that
        # re-enable the GIL on 3.14t (httptools 0.7.x, grpcio, granian,
        # setproctitle). Covers the pure-Python core that the FT marking
        # actually claims. ``dev-http`` (httpx, flask), ``dev-sentry``
        # (sentry-sdk), and the ``click`` extra are pure Python — pulled in so
        # tests/http and tests/hosting/services collect cleanly.
        run: >
          uv sync --python 3.14t --no-default-groups
          --group tests --group tests-unit
          --group dev-http --group dev-sentry
          --extra http --extra scheduler --extra cron --extra click
      - name: pytest
        timeout-minutes: 5
        env:
          PYTHON_GIL: "0"  # fail loudly if any imported C ext re-enables the GIL
        # Skip ``tests/openapi`` — those tests require the ``openapi`` extra
        # (msgspec C extension) which isn't covered by the FT-clean subset.
        run: uv run --python 3.14t pytest -v -m "not integration" --ignore=tests/openapi
