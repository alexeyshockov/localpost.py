[build-system]
requires = ["pdm-backend", "pdm-build-locked"]
build-backend = "pdm.backend"

# See also https://daniel.feldroy.com/posts/2023-08-pypi-project-urls-cheatsheet
[project.urls]
Homepage = 'https://github.com/alexeyshockov/localpost.py'
Changelog = 'https://github.com/alexeyshockov/localpost.py/blob/main/CHANGELOG.md'
Docs = 'https://alexeyshockov.github.io/localpost.py/'

[project]
name = "localpost"
description = "Consumers framework for different message brokers & simple in-process task scheduler"
requires-python = ">=3.10"
dynamic = ["version"]
readme = "pypi_readme.md"
license = "MIT" # https://packaging.python.org/en/latest/guides/writing-pyproject-toml/#pep-639-license-declaration
authors = [
    { name = "Alexey Shokov" },
]
keywords = [
    "scheduler", "cron",
    "message brokers", "sqs", "kafka", "nats", "rabbitmq",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "Framework :: AsyncIO",
    "Framework :: AnyIO",
    "Framework :: Trio",
    "Topic :: System",
    "Topic :: Software Development",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Office/Business :: Scheduling",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
]
dependencies = [
    "typing_extensions ~=4.10",
    "anyio >=3.6,<5.0",
]

[project.optional-dependencies]
http = [  # Hosting service
    "uvicorn ~=0.30",
]
grpc = [  # Hosting service
    "grpcio ~=1.68",
]
cron = [
    "croniter >=2.0,<4.0",
]
scheduler = [  # TODO Better name
#    "localpost[cron]",
    "humanize >=3.0,<5.0",
    "pytimeparse2 ~=1.6",
]
sqs = [
    "aiobotocore ~=2.15",
    "botocore ~=1.37",
#    "aws-lambda-powertools",  # To migrate from Lambda
]
kafka = [
    "confluent-kafka ~=2.4",
#    "confluent-kafka[schemaregistry,protobuf] ~=2.4",
]
nats = [
    "nats-py ~=2.8",
]
rabbitmq = [
    "aio-pika ~=9.1",
#    "pika ~=1.3",
]
pubsub = [
    "google-cloud-pubsub ~=2.28",
]
azure = [
    "azure-identity",
    "azure-storage-queue ~=12.8",
    "azure-servicebus ~=7.10",
]

# Yay, https://peps.python.org/pep-0735/ is finally here!
#[tool.pdm.dev-dependencies]
[dependency-groups]
dev = [
    "icecream ~=2.1",
    "structlog ~=25.0",
]
dev-consumers = [
    "aws-lambda-powertools",
    "confluent-kafka[schemaregistry,protobuf]",
    "grpcio-tools ~=1.68",
]
dev-otel = [
    "opentelemetry-exporter-otlp",  # Both gRPC and HTTP
    "opentelemetry-instrumentation-confluent-kafka >=0.50b0",
    "opentelemetry-instrumentation-aiokafka >=0.50b0",
    "opentelemetry-instrumentation-botocore >=0.50b0",
    "protobuf ~=5.0",  # See https://github.com/open-telemetry/opentelemetry-python/issues/4639#issuecomment-2997003823
]
dev-types = [
    "types-croniter",
#    "types-confluent-kafka",  # Many signatures do not match to the actual implementation
#    "types-protobuf",
#    "grpc-stubs",  # Hasn't been updated for 2+ years...
    "types-boto3-lite[sqs] ~=1.37",
    "types-aiobotocore[sqs] ~=2.15",
]
examples = [
    "fast-depends ~=2.4",
    "fastapi-slim ~=0.111",
    'psycopg[binary,pool] ~=3.2',
]
tests = [
    "pytest ~=8.1",
    "anyio[test]",
    "pytest-xdist",
]
unit-tests = [
    "pytest-mock ~=3.14",
    "pytest-cov ~=6.0",
    "coverage[toml] ~=7.6",
]
integration-tests = [
    "boto3 ~=1.38",
    "testcontainers ~=4.10",
]

[tool.coverage.run]
omit = ["tests/*"]

[tool.pyright]
include = ["localpost"]

[[tool.mypy.overrides]]
module = ["grpc.*", "pytimeparse2.*", "confluent_kafka.*"]
follow_untyped_imports = true

[tool.ruff]
line-length = 120
format.docstring-code-format = true

[tool.ruff.lint]
# For the reference, check https://docs.astral.sh/ruff/rules/
select = [
    "F",  # pyflakes
    "E", "W",  # pycodestyle
    "I",  # isort
    "Q",  # flake8-quotes
    "UP",  # pyupgrade
    "YTT",  # flake8-2020
    # TODO Uncomment after adding annotations to all modules
    # All "ANN" rules are covered by mypy, except "ANN204"
#    "ANN204",  # Missing return type annotation for special method ...
    "ASYNC",  # flake8-async
    "S",  # flake8-bandit
    "BLE",  # flake8-blind-except
    "B",  # flake8-bugbear
    "A",  # flake8-builtins
    "C4",  # flake8-comprehensions
    "DTZ",  # flake8-datetimez
    "T10",  # flake8-debugger
    "EXE",  # flake8-executable
    "FA",  # flake8-future-annotations
    # XXX Causes warning https://github.com/astral-sh/ruff/issues/8272
    "ISC",  # flake8-implicit-str-concat
    "G",  # flake8-logging-format
    "INP",  # flake8-no-pep420
    "PIE",  # flake8-pie
    "T20",  # flake8-print
    "PT",  # flake8-pytest-style
    # The rest of RET rules don't improve code and may even worsen readability
    "RET501", "RET502", "RET503",  # flake8-return
    "SLOT",  # flake8-slots
    "SIM",  # flake8-simplify
    "TID",  # flake8-tidy-imports
    "PTH",  # flake8-use-pathlib
#    "FIX",  # flake8-fixme
    "PGH",  # pygrep-hooks
    "PL",  # Pylint
    "TRY",  # tryceratops
    "PERF",  # Perflint
    "LOG",  # flake8-logging
    "RUF",  # Ruff-specific
]

ignore = [
    "S101",  # Use of `assert` detected
    "S311",  # Standard pseudo-random generators are not suitable for cryptographic purposes
    "B011",  # Do not `assert False`
    "SIM108",  # Use ternary operator
    # TODO Remove when we drop support for Python <=3.10
    "SIM117",  # Use a single `with` statement with multiple contexts
    "PLR0913",  # Too many arguments in function definition
    "PLR2004",  # Magic value used in comparison
    # TODO Reduce complexity
    "PLR0911", "PLR0912", "PLR0915",  # Too many ...
    # Too many false positives
    "PLW2901",  # ... loop variable ... overwritten by assignment target
    "TRY003",  # Avoid specifying long messages outside the exception class
    "TRY400",  # Use `logging.exception` instead of `logging.error`
    "RUF012",  # Mutable class attributes should be annotated with `typing.ClassVar`
]

pyupgrade.keep-runtime-typing = true

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
docstring-code-format = true

[tool.pdm]
distribution = true

[tool.pdm.version]
source = "scm"
write_to = "localpost/__meta__.py"
write_template = "version = '{}'"

[tool.pdm.build]
excludes = ["./**/.git", "tests", "examples"]

[tool.pytest.ini_options]
minversion = "8.0"
#addopts = "-q -m 'not integration'"
testpaths = [
    "tests",
]
python_files = [
    "*.py",
]
markers = [
    "integration: Consumers (SQS, Kafka, NATS, RabbitMQ) integration tests",
]
